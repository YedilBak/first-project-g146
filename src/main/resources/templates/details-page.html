<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="main-maket.html">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-6">
            <form method="post" action="/update">

                <input type="hidden" th:name="id" th:value="${user.id}">

                <div class="row mt-2">
                    <div class="col-12">
                        <label>FULL NAME:</label>
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="col-12">
                        <input type="text" class="form-control" th:name="fullName" th:value="${user.fullName}">
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="col-12">
                        <label>CITY:</label>
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="col-12">
                        <input type="text" class="form-control" th:name="city" th:value="${user.city}">
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="col-12">
                        <label>RATING:</label>
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="col-12">
                        <input type="text" class="form-control" th:name="rating" th:value="${user.rating}">
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="col-12">
                        <label>IIN:</label>
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="col-12">
                        <input type="text" class="form-control" th:name="iin" th:value="${user.iin}">
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="col-12">
                        <button class="btn btn-success btn-sm">UPDATE USER</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
