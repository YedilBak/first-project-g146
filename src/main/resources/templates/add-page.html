<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" type="text/css" href="/css/bootstrap.min.css">
    <script src="/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div th:insert="navbar.html"></div>
<div class="container mt-3">
    <div class="row justify-content-center">
        <div class="col-6">
            <form method="post" action="/add">
                <div class="row mt-2">
                    <div class="col-12">
                        <label>FULL NAME:</label>
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="col-12">
                        <input type="text" class="form-control" th:name="fullName">
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="col-12">
                        <label>CITY:</label>
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="col-12">
                        <input type="text" class="form-control" th:name="city">
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="col-12">
                        <label>RATING:</label>
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="col-12">
                        <input type="text" class="form-control" th:name="rating">
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="col-12">
                        <label>IIN:</label>
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="col-12">
                        <input type="text" class="form-control" th:name="iin">
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="col-12">
                        <button class="btn btn-success btn-sm">ADD USER</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
